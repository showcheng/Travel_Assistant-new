server:
  port: 8086

spring:
  application:
    name: travel-ai

# 数据源配置（继承公共模块）
  datasource:
    url: jdbc:postgresql://localhost:5432/travel_assistant
    username: postgres
    password: postgres

  # Redis 配置（继承公共模块）
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.travel.ai.entity

# GLM-5 API 配置
glm5:
  api:
    key: ${GLM5_API_KEY:e217140203d34544acb721230c4f3d57.M4VERrYX2rKgB66r}
    url: https://open.bigmodel.cn/api/paas/v4/
    model: glm-4
    temperature: 0.7
    max-tokens: 2000
    timeout: 30000

# 日志配置
logging:
  level:
    com.travel.ai: DEBUG
  file:
    name: logs/travel-ai.log
