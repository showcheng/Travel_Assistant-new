server:
  port: 8086

spring:
  application:
    name: travel-ai

# 数据源配置（继承公共模块）
  datasource:
    url: jdbc:mysql://localhost:3306/travel_assistant?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置（继承公共模块）
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.travel.ai.entity

# GLM-5 API 配置
glm5:
  api:
    key: ${GLM5_API_KEY:aec03238ded8496cbfc7573617f2c3a5.cMOIkdJvXZ8Aim3U}
    url: https://open.bigmodel.cn/api/paas/v4/
    model: glm-4
    temperature: 0.7
    max-tokens: 2000
    timeout: 30000

# Milvus向量数据库配置
milvus:
  host: localhost
  port: 19530
  collection-name: travel_knowledge
  dimension: 768

# 日志配置
logging:
  level:
    com.travel.ai: DEBUG
  file:
    name: logs/travel-ai.log

# 外部服务配置
service:
  product:
    url: http://localhost:8082
  order:
    url: http://localhost:8083

# 用户画像记忆配置
travel:
  memory:
    decay-rate: 0.005
    min-confidence: 0.1
    max-profile-size: 2048
    cleanup-interval-minutes: 60
    distillation-min-messages: 4
