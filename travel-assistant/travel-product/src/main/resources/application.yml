server:
  port: 8082

spring:
  application:
    name: travel-product

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel_assistant?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Jackson配置 (JSON序列化)
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    charset: UTF-8
  http:
    encoding:
      charset: UTF-8
      force: true
      force-request: true

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.travel.product.entity

# 日志配置
logging:
  level:
    com.travel.product: DEBUG
  file:
    name: logs/travel-product.log
