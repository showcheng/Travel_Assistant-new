server:
  port: 8087

spring:
  application:
    name: travel-live

# 数据源配置（继承公共模块）
  datasource:
    url: jdbc:postgresql://localhost:5432/travel_assistant
    username: postgres
    password: postgres

  # Redis 配置（继承公共模块）
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.travel.live.entity

# 数字人直播配置
digital-human:
  provider: aliyun
  access-key: ${ALIYUN_ACCESS_KEY:your-access-key}
  app-key: ${ALIYUN_APP_KEY:your-app-key}
  avatar-id: xiaoxia
  voice-id: zhixiaoxia

# WebSocket 配置
websocket:
  max-connections: 10
  heartbeat-interval: 30000

# 日志配置
logging:
  level:
    com.travel.live: DEBUG
  file:
    name: logs/travel-live.log
