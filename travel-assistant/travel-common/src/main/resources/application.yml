# Spring Boot 配置
spring:
  application:
    name: travel-assistant

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel_assistant?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 5
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开 PSCache，并且指定每个连接上 PSCache 的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 通过 connectProperties 属性来打开 mergeSql 功能；慢 SQL 记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # Druid StatViewServlet 配置
      stat-view-servlet:
        # 启用 StatViewServlet
        enabled: true
        # 访问路径为 /druid/*
        url-pattern: /druid/*
        # 禁止手动重置监控数据
        reset-enable: false
        # 用户名
        login-username: admin
        # 密码
        login-password: admin
      # Druid StatFilter 配置
      web-stat-filter:
        # 启用 StatFilter
        enabled: true
        # 拦截所有请求
        url-pattern: /*
        # 排除一些不需要拦截的路径
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 8
          # 连接池最大阻塞等待时间
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池中的最小空闲连接
          min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  # mapper 文件位置
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 实体类扫描包路径
  type-aliases-package: com.travel.*.entity
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键类型（AUTO 自增）
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: travel-assistant-secret-key-2024-smart-travel-platform
  expiration: 604800000 # 7 天，单位：毫秒

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# Sentinel 配置
spring.cloud.sentinel:
  transport:
    dashboard: localhost:8080
    port: 8719
  eager: true
  datasource:
    # 流控规则数据源
    flow:
      nacos:
        server-addr: localhost:8848
        dataId: ${spring.application.name}-flow-rules
        groupId: SENTINEL_GROUP
        rule-type: flow

# 日志配置
logging:
  level:
    root: INFO
    com.travel: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/travel-assistant.log
    max-size: 10MB
    max-history: 30
